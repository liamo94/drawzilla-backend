name = "drawzilla-backend"
main = "src/index.ts"
compatibility_date = "2025-05-25"

[triggers]
crons = ["0 2 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "drawzilla-db"
database_id = "2b12262c-728c-474a-93ba-0d2e55c97330"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "drawzilla-canvases"

# 20 requests per minute per user — applied to share creation and migration endpoints
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[vars]
ENVIRONMENT = "production"

# Secrets — set via: wrangler secret put <KEY>
# CLERK_SECRET_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# CLERK_WEBHOOK_SECRET

# Pre-production checklist:
# 1. Apply D1 migrations: npx wrangler d1 migrations apply drawzilla-db --remote
# 2. Set secrets above
